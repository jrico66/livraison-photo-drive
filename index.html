<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Livraison">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#185FA5">
  <title>Réception Livraison</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    :root {
      --blue: #185FA5; --blue-light: #e6f1fb; --blue-text: #0c447c;
      --green: #3B6D11; --gray-bg: #f5f5f3; --gray-card: #ffffff;
      --gray-border: rgba(0,0,0,0.12); --gray-border2: rgba(0,0,0,0.22);
      --text-primary: #1a1a18; --text-secondary: #5f5e5a; --text-hint: #888780;
      --radius: 10px; --radius-lg: 14px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --gray-bg: #1a1a18; --gray-card: #2c2c2a;
        --gray-border: rgba(255,255,255,0.12); --gray-border2: rgba(255,255,255,0.22);
        --text-primary: #f0efe8; --text-secondary: #b4b2a9; --text-hint: #888780;
        --blue-light: #0c447c; --blue-text: #85b7eb;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { background: var(--gray-bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text-primary); }
    .app { max-width: 500px; margin: 0 auto; padding: 16px 16px 32px; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding-top: 8px; }
    .header-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--blue); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header p { font-size: 13px; color: var(--text-secondary); margin-top: 1px; }
    .card { background: var(--gray-card); border: 0.5px solid var(--gray-border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 12px; }
    .section-label { font-size: 11px; font-weight: 600; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
    .lot-big { background: var(--blue-light); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; text-align: center; }
    .lot-big-label { font-size: 11px; color: var(--blue-text); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .lot-big-value { font-size: 28px; font-weight: 700; color: var(--blue-text); letter-spacing: 0.04em; font-family: monospace; }
    .lot-big-detail { font-size: 11px; color: var(--blue-text); margin-top: 4px; opacity: 0.8; }
    .info-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .info-box-small { flex: 1; background: var(--gray-bg); border-radius: var(--radius); padding: 8px 12px; }
    .info-box-small-label { font-size: 10px; color: var(--text-hint); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .info-box-small-value { font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-top: 2px; }
    select { width: 100%; padding: 10px 12px; border-radius: var(--radius); border: 0.5px solid var(--gray-border2); background: var(--gray-bg); color: var(--text-primary); font-size: 15px; appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%23888' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 32px; margin-bottom: 10px; }
    .folder-preview { background: var(--gray-bg); border-radius: var(--radius); padding: 8px 12px; font-size: 12px; font-family: monospace; color: var(--text-secondary); word-break: break-all; }
    textarea { width: 100%; padding: 10px 12px; border-radius: var(--radius); border: 0.5px solid var(--gray-border2); background: var(--gray-bg); color: var(--text-primary); font-size: 14px; resize: none; font-family: inherit; margin-top: 10px; }
    textarea::placeholder { color: var(--text-hint); }
    .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .tag { font-size: 13px; padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--gray-border2); cursor: pointer; color: var(--text-secondary); background: transparent; font-family: inherit; }
    .tag.active { background: var(--blue); color: #fff; border-color: transparent; }
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .photo-thumb { aspect-ratio: 1; border-radius: var(--radius); border: 0.5px solid var(--gray-border); overflow: hidden; position: relative; background: var(--gray-bg); }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .del-btn { position: absolute; top: 5px; right: 5px; width: 22px; height: 22px; border-radius: 50%; background: rgba(0,0,0,0.6); color: #fff; border: none; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .type-tag { position: absolute; bottom: 5px; left: 5px; background: rgba(0,0,0,0.6); color: #fff; font-size: 10px; padding: 2px 7px; border-radius: 6px; }
    .add-btn { aspect-ratio: 1; border-radius: var(--radius); border: 1.5px dashed var(--gray-border2); background: transparent; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; color: var(--text-hint); font-size: 11px; font-family: inherit; }
    .photos-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .photo-counter { font-size: 12px; color: var(--text-secondary); background: var(--gray-bg); padding: 3px 10px; border-radius: 20px; }
    .send-btn { width: 100%; padding: 16px; border-radius: var(--radius-lg); border: none; background: var(--blue); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 4px; font-family: inherit; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn.success { background: var(--green); }
    .progress-bar { height: 4px; border-radius: 2px; background: var(--gray-border); overflow: hidden; margin-top: 10px; }
    .progress-fill { height: 100%; border-radius: 2px; background: var(--blue); transition: width 0.3s; }
    .log { font-size: 12px; color: var(--text-secondary); margin-top: 7px; min-height: 16px; line-height: 1.4; }
    .warning { background: #faeeda; border-radius: var(--radius); padding: 8px 12px; font-size: 12px; color: #633806; margin-top: 8px; display: none; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M12.5 8.5C13.8 5.5 17 4 19.5 5.5C21.8 7 22.5 10 21 12L19 15H14L12.5 8.5Z" fill="white"/>
        <path d="M6 15L4 12C2.5 9 4 6 7 5.5C9 5.2 11 6.5 11.5 8.5L13.5 15H6Z" fill="white" opacity="0.8"/>
        <path d="M5 15H19L18 19H6L5 15Z" fill="white" opacity="0.6"/>
      </svg>
    </div>
    <div>
      <h1>Réception livraison</h1>
      <p>ZIP automatique → OneDrive</p>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Fournisseur</div>
    <select id="fournisseur" onchange="updateUI()">
      <option value="">— Sélectionner le fournisseur —</option>
      <option value="01|Sysco">01 — Sysco</option>
      <option value="02|Metro">02 — Metro</option>
      <option value="03|Compagnie des Desserts">03 — Compagnie des Desserts</option>
      <option value="07|Sibio">07 — Sibio</option>
      <option value="09|Dombrial">09 — Dombrial</option>
      <option value="10|Igual">10 — Igual</option>
      <option value="11|Pro a Pro">11 — Pro à Pro</option>
      <option value="12|Camblong">12 — Camblong</option>
      <option value="13|Episaveur">13 — Episaveur</option>
    </select>

    <div class="lot-big" id="lotBig">
      <div class="lot-big-label">Numéro de lot généré</div>
      <div class="lot-big-value" id="lotNum">--</div>
      <div class="lot-big-detail" id="lotDetail">Sélectionne un fournisseur</div>
    </div>

    <div class="info-row">
      <div class="info-box-small">
        <div class="info-box-small-label">Jour</div>
        <div class="info-box-small-value" id="jourNum">--</div>
      </div>
      <div class="info-box-small">
        <div class="info-box-small-label">Année</div>
        <div class="info-box-small-value" id="anneeNum">--</div>
      </div>
      <div class="info-box-small">
        <div class="info-box-small-label">Date</div>
        <div class="info-box-small-value" id="dateBadge">--</div>
      </div>
    </div>

    <div class="section-label">Fichier ZIP</div>
    <div class="folder-preview" id="folderPreview">Sélectionne un fournisseur</div>

    <textarea id="notes" rows="2" placeholder="Notes : palette abîmée, colis manquant, température…"></textarea>
    <div class="warning" id="warnFournisseur">⚠️ Sélectionne un fournisseur pour générer le numéro de lot</div>
  </div>

  <div class="card">
    <div class="photos-header">
      <div class="section-label" style="margin-bottom:0;">Photos</div>
      <span class="photo-counter" id="photoCounter">0 photo</span>
    </div>
    <div class="section-label">Type de document</div>
    <div class="tag-row">
      <button class="tag active" onclick="selectTag(this,'BL')">BL</button>
      <button class="tag" onclick="selectTag(this,'Etiquette')">Étiquette</button>
      <button class="tag" onclick="selectTag(this,'Carton')">Carton</button>
      <button class="tag" onclick="selectTag(this,'Palette')">Palette</button>
      <button class="tag" onclick="selectTag(this,'Dommage')">Dommage</button>
    </div>
    <div class="photo-grid" id="photoGrid"></div>
    <input type="file" id="fileInput" accept="image/*" capture="environment" multiple style="display:none" onchange="addPhotos(event)">
  </div>

  <button class="send-btn" id="sendBtn" onclick="createZip()" disabled>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="7 10 12 15 17 10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="12" y1="15" x2="12" y2="3" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </svg>
    Télécharger le dossier ZIP
  </button>

  <div id="progressWrap" style="display:none;">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="log" id="logMsg"></div>
  </div>
</div>

<script>
  // Fournisseurs : code -> nom
  const FOURNISSEURS = {
    '01': 'Sysco', '02': 'Metro', '03': 'Compagnie des Desserts',
    '07': 'Sibio', '09': 'Dombrial', '10': 'Igual',
    '11': 'Pro a Pro', '12': 'Camblong', '13': 'Episaveur'
  };

  let photos = [];
  let currentTag = 'BL';
  let codeFournisseur = '';
  let nomFournisseur = '';

  function pad(n) { return String(n).padStart(2,'0'); }

  function getDayOfYear() {
    const now = new Date();
    const start = new Date(now.getFullYear(), 0, 0);
    const diff = now - start;
    const oneDay = 1000 * 60 * 60 * 24;
    return Math.floor(diff / oneDay);
  }

  function getTodayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }

  function getYear2() {
    return String(new Date().getFullYear()).slice(-2);
  }

  // Format lot : CODE_FOURNISSEUR + JOUR_ANNEE (ex: 01-105-26)
  function genLotNumber(code) {
    const jour = getDayOfYear();
    const annee = getYear2();
    return `${code}-${jour}-${annee}`;
  }

  function updateUI() {
    const val = document.getElementById('fournisseur').value;
    const today = getTodayStr();
    const jour = getDayOfYear();
    const annee = getYear2();

    document.getElementById('dateBadge').textContent = today;
    document.getElementById('jourNum').textContent = jour;
    document.getElementById('anneeNum').textContent = '20' + annee;

    if (!val) {
      codeFournisseur = '';
      nomFournisseur = '';
      document.getElementById('lotNum').textContent = '--';
      document.getElementById('lotDetail').textContent = 'Sélectionne un fournisseur';
      document.getElementById('folderPreview').textContent = 'Sélectionne un fournisseur';
      document.getElementById('warnFournisseur').style.display = 'block';
      updateSendBtn();
      return;
    }

    document.getElementById('warnFournisseur').style.display = 'none';
    const parts = val.split('|');
    codeFournisseur = parts[0];
    nomFournisseur = parts[1];

    const lot = genLotNumber(codeFournisseur);
    document.getElementById('lotNum').textContent = lot;
    document.getElementById('lotDetail').textContent = `Code ${codeFournisseur} · Jour ${jour} · Année ${annee}`;
    document.getElementById('folderPreview').textContent = `${today} — ${lot} — ${nomFournisseur}.zip`;
    updateSendBtn();
  }

  function selectTag(btn, tag) {
    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    currentTag = tag;
  }

  function addPhotos(e) {
    Array.from(e.target.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => { photos.push({ data: ev.target.result, file, tag: currentTag }); renderPhotos(); };
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  }

  function removePhoto(i) { photos.splice(i,1); renderPhotos(); }

  function renderPhotos() {
    const grid = document.getElementById('photoGrid');
    grid.innerHTML = '';
    photos.forEach((p,i) => {
      const div = document.createElement('div');
      div.className = 'photo-thumb';
      div.innerHTML = `<img src="${p.data}"><button class="del-btn" onclick="removePhoto(${i})">✕</button><span class="type-tag">${p.tag}</span>`;
      grid.appendChild(div);
    });
    const btn = document.createElement('button');
    btn.className = 'add-btn';
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="26" height="26"><circle cx="12" cy="12" r="3.5"/><path d="M3 9h2.5l2-3h9l2 3H21a1 1 0 011 1v9a1 1 0 01-1 1H3a1 1 0 01-1-1V10a1 1 0 011-1z"/></svg><span>Ajouter</span>`;
    btn.onclick = () => document.getElementById('fileInput').click();
    grid.appendChild(btn);
    const c = photos.length;
    document.getElementById('photoCounter').textContent = c === 0 ? '0 photo' : c === 1 ? '1 photo' : `${c} photos`;
    updateSendBtn();
  }

  function updateSendBtn() {
    document.getElementById('sendBtn').disabled = photos.length === 0 || !codeFournisseur;
  }

  function setLog(msg) { document.getElementById('logMsg').textContent = msg; }
  function setProgress(pct) { document.getElementById('progressFill').style.width = pct+'%'; }

  function dataURLtoUint8(dataURL) {
    const base64 = dataURL.split(',')[1];
    const bin = atob(base64);
    const arr = new Uint8Array(bin.length);
    for (let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
    return arr;
  }

  async function createZip() {
    document.getElementById('progressWrap').style.display = 'block';
    setProgress(0);
    setLog('Création du dossier...');

    const today = getTodayStr();
    const lot = genLotNumber(codeFournisseur);
    const folderName = `${today} — ${lot} — ${nomFournisseur}`;
    const zipName = `${folderName}.zip`;

    const zip = new JSZip();
    const folder = zip.folder(folderName);

    const notes = document.getElementById('notes').value.trim();
    const infoTxt = [
      `Date         : ${today}`,
      `Numéro de lot: ${lot}`,
      `Code         : ${codeFournisseur}`,
      `Fournisseur  : ${nomFournisseur}`,
      `Jour année   : ${getDayOfYear()}`,
      `Année        : 20${getYear2()}`,
      `Nb photos    : ${photos.length}`,
      notes ? `Notes        : ${notes}` : '',
    ].filter(Boolean).join('\n');
    folder.file('infos.txt', infoTxt);

    setProgress(10);

    const tagCounts = {};
    for (let i=0; i<photos.length; i++) {
      const p = photos[i];
      tagCounts[p.tag] = (tagCounts[p.tag]||0)+1;
      const ext = (p.file.name.split('.').pop()||'jpg').toLowerCase();
      const fname = `${p.tag}_${String(tagCounts[p.tag]).padStart(2,'0')}.${ext}`;
      folder.file(fname, dataURLtoUint8(p.data));
      setProgress(10 + Math.round(80*(i+1)/photos.length));
      setLog(`Compression ${i+1}/${photos.length} — ${fname}`);
      await new Promise(r => setTimeout(r, 10));
    }

    setProgress(90);
    setLog('Génération ZIP...');

    const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
    setProgress(100);

    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = zipName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    setLog(`✓ "${zipName}" téléchargé — glisse-le dans ton OneDrive !`);
    document.getElementById('sendBtn').classList.add('success');
    document.getElementById('sendBtn').innerHTML = '✓ ZIP téléchargé !';

    setTimeout(() => {
      document.getElementById('sendBtn').classList.remove('success');
      document.getElementById('sendBtn').innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="7 10 12 15 17 10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="15" x2="12" y2="3" stroke="white" stroke-width="2" stroke-linecap="round"/></svg> Télécharger le dossier ZIP';
      photos = []; renderPhotos();
      document.getElementById('fournisseur').value = '';
      updateUI();
    }, 4000);
  }

  // Init
  updateUI();
  renderPhotos();
</script>
</body>
</html>
